# Keep Supabase auth email templates in sync with the repo: any change
# under supabase/emails/ is pushed to the project via the Management API.
#
# Secret: SUPABASE_ACCESS_TOKEN — a personal access token from
# https://supabase.com/dashboard/account/tokens
name: Sync email templates

on:
  push:
    branches: [main]
    paths:
      - "supabase/emails/**"
      - "scripts/push-email-templates.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync templates (skips cleanly until the secret exists)
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN is not set — templates NOT synced. Add the secret (from https://supabase.com/dashboard/account/tokens) and re-run."
            exit 0
          fi
          python3 scripts/push-email-templates.py
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: tofxluhjxeaorulptceu
