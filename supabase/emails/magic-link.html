<div style="margin:0;padding:32px 16px;background:#f6f5f2;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
  <div style="max-width:480px;margin:0 auto;background:#ffffff;border:1px solid #e7e5e0;border-radius:12px;padding:32px;">
    <div style="font-size:28px;margin-bottom:4px;">🐈</div>
    <h1 style="margin:0 0 8px;font-size:20px;color:#1f2937;">Your Whisker sign-in link</h1>
    <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#4b5563;">
      Click below to sign in as <strong>{{ .Email }}</strong> — no password needed.
    </p>
    <a href="{{ .ConfirmationURL }}"
       style="display:inline-block;background:#6366f1;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 24px;border-radius:8px;">
      Sign in to Whisker
    </a>
    <p style="margin:24px 0 0;font-size:12px;line-height:1.6;color:#9ca3af;">
      Or enter this code in the app: <strong style="color:#4b5563;letter-spacing:2px;">{{ .Token }}</strong><br>
      If you didn't request this link, you can safely ignore this email.
    </p>
  </div>
  <p style="max-width:480px;margin:16px auto 0;font-size:11px;color:#9ca3af;text-align:center;">
    Whisker — an open-source collaborative whiteboard
  </p>
</div>
